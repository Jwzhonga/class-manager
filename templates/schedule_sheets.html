{% extends "base.html" %}
{% block content %}
<h4 class="page-title"><i class="fas fa-file-excel"></i> 选择要解析的Sheet</h4>

<div class="card">
    <div class="card-body">
        <p class="text-muted">该Excel文件包含多个工作表，请选择要导入课表的一个：</p>
        <div class="list-group">
            {% for s in sheets %}
            <form method="post" action="/schedule/parse_sheet" style="display:inline">
                <input type="hidden" name="file_path" value="{{ file_path }}">
                <input type="hidden" name="sheet_name" value="{{ s }}">
                <button type="submit" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-sheet"></i> {{ s }}</span>
                    <span class="badge bg-primary rounded-pill">解析此Sheet</span>
                </button>
            </form>
            {% endfor %}
        </div>
        <div class="mt-3">
            <a href="/schedule" class="btn btn-outline-secondary">取消</a>
        </div>
    </div>
</div>
{% endblock %}
