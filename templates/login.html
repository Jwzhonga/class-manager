<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理系统 - 登录</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <link href="/static/fontawesome.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .login-card .card-body { padding: 2rem; }
        .login-card h4 { color: #1a1a1a; font-weight: 600; }
        .login-card .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
        }
        .login-card .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .login-card .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .login-card .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .login-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 8px;
        }
        @media (max-width: 576px) {
            .login-card .card-body { padding: 1.5rem; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="card-body p-4">
                    <div class="text-center mb-3">
                        <div class="login-icon"><i class="fas fa-graduation-cap"></i></div>
                        <h4>班级管理系统</h4>
                        <p class="text-muted small mb-0">请登录以继续</p>
                    </div>
                    {% with messages = get_flashed_messages() %}
                    {% if messages %}
                    {% for msg in messages %}
                    <div class="alert alert-info py-2" style="border-radius:8px">{{ msg }}</div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-medium">用户名</label>
                            <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-medium">密码</label>
                            <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-muted">还没有账号？<a href="/register" class="text-decoration-none" style="color:#667eea">注册账号</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
